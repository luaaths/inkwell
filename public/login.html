<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Inkwell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
    <div class="auth-card fade-up">

        <div class="auth-logo">Ink<span>well</span></div>
        <h2>Welcome back</h2>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="your_username" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div id="alert" class="alert"></div>

        <button class="btn btn-primary" id="login-btn" onclick="login()" style="margin-top:8px;">
            Log in
        </button>

        <div class="auth-footer">
            No account? <a href="register.html">Create one →</a>
        </div>

    </div>
</div>

<script>
// Redirect if already logged in
fetch("/me").then(r => r.json()).then(data => {
    if (data.loggedIn) window.location = "index.html";
});

const alertEl = document.getElementById("alert");
const btn     = document.getElementById("login-btn");

function showAlert(msg, type = "error") {
    alertEl.textContent = msg;
    alertEl.className   = `alert alert-${type} show`;
}

// Allow Enter key to submit
document.addEventListener("keydown", e => {
    if (e.key === "Enter") login();
});

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    alertEl.className = "alert";

    if (!username || !password) {
        return showAlert("Please fill in all fields.");
    }

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Logging in…`;

    try {
        const res  = await fetch("/login", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
            showAlert("Success! Redirecting…", "success");
            setTimeout(() => { window.location = "index.html"; }, 600);
        } else {
            showAlert(data.error || "Login failed.");
            btn.disabled = false;
            btn.textContent = "Log in";
        }

    } catch {
        showAlert("Could not reach the server.");
        btn.disabled = false;
        btn.textContent = "Log in";
    }
}
</script>
</body>
</html>
