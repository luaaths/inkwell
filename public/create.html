<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write — Inkwell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">Ink<span>well</span></a>
    <div class="nav-links">
        <span id="nav-username"></span>
        <a href="index.html" class="btn btn-outline" style="font-size:0.82rem; padding:6px 14px;">← Feed</a>
    </div>
</nav>

<div class="page-wrap" style="max-width:680px;">

    <div style="margin-bottom:32px;">
        <div class="hero-eyebrow">New Post</div>
        <h1 style="font-family:'Playfair Display',serif; font-size:2rem; font-weight:700; letter-spacing:-0.02em; margin-top:8px;">What's on your mind?</h1>
    </div>

    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" placeholder="Give your post a title…" maxlength="120">
        <div style="font-size:0.75rem; color:var(--muted); margin-top:4px; text-align:right;">
            <span id="title-count">0</span>/120
        </div>
    </div>

    <div class="form-group">
        <label for="content">Content</label>
        <textarea id="content" placeholder="Write something…"></textarea>
        <div style="font-size:0.75rem; color:var(--muted); margin-top:4px;">
            <span id="word-count">0 words</span>
        </div>
    </div>

    <div class="form-group">
        <label>Cover Image <span style="font-weight:400; text-transform:none; letter-spacing:0; color:var(--muted); font-size:0.78rem;">(optional, max 5MB)</span></label>
        <div class="file-input-wrap">
            <label for="image" class="file-label">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                Choose image…
            </label>
            <input type="file" id="image" accept="image/*" onchange="previewImage(this)">
            <div id="file-name"></div>
        </div>
        <img id="image-preview" style="display:none; margin-top:12px; max-height:200px; object-fit:cover; border-radius:8px; border:1px solid var(--border);" alt="Preview">
    </div>

    <div id="alert" class="alert"></div>

    <div style="display:flex; gap:12px; margin-top:8px;">
        <button class="btn btn-primary" id="submit-btn" onclick="publish()" style="flex:1;">
            Publish post
        </button>
        <a href="index.html" class="btn btn-outline">Cancel</a>
    </div>

</div>

<script>
// Gate: must be logged in
fetch("/me").then(r => r.json()).then(data => {
    if (!data.loggedIn) {
        window.location = "login.html";
    } else {
        document.getElementById("nav-username").textContent = data.username;
    }
});

// Title character counter
document.getElementById("title").addEventListener("input", function() {
    document.getElementById("title-count").textContent = this.value.length;
});

// Word counter for content
document.getElementById("content").addEventListener("input", function() {
    const words = this.value.trim() ? this.value.trim().split(/\s+/).length : 0;
    document.getElementById("word-count").textContent = `${words} word${words === 1 ? "" : "s"}`;
});

function previewImage(input) {
    const file = input.files[0];
    if (!file) return;

    document.getElementById("file-name").textContent = file.name;

    const reader = new FileReader();
    reader.onload = e => {
        const preview = document.getElementById("image-preview");
        preview.src   = e.target.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(file);
}

const alertEl = document.getElementById("alert");
const btn     = document.getElementById("submit-btn");

function showAlert(msg, type = "error") {
    alertEl.textContent = msg;
    alertEl.className   = `alert alert-${type} show`;
    alertEl.scrollIntoView({ behavior: "smooth", block: "center" });
}

async function publish() {
    const title   = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    const image   = document.getElementById("image").files[0];

    alertEl.className = "alert";

    if (!title) return showAlert("Please add a title.");
    if (!content) return showAlert("Please write some content.");

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Publishing…`;

    const form = new FormData();
    form.append("title", title);
    form.append("content", content);
    if (image) form.append("image", image);

    try {
        const res  = await fetch("/posts", { method: "POST", body: form });
        const data = await res.json();

        if (data.success) {
            showAlert("Post published!", "success");
            setTimeout(() => { window.location = "index.html"; }, 800);
        } else {
            showAlert(data.error || "Failed to publish.");
            btn.disabled = false;
            btn.textContent = "Publish post";
        }

    } catch {
        showAlert("Could not reach the server.");
        btn.disabled = false;
        btn.textContent = "Publish post";
    }
}
</script>
</body>
</html>
